name: Publish editor

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to publish from the current npm latest dist-tag.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-editor
  cancel-in-progress: false

jobs:
  publish:
    name: Publish editor to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require('node:child_process')
          const { readFileSync } = require('node:fs')

          const packageJson = JSON.parse(readFileSync('packages/editor/package.json', 'utf8'))
          const packageName = packageJson.name
          const bump = process.env.BUMP

          let latest = ''
          try {
            latest = execFileSync('npm', ['view', packageName, 'dist-tags.latest', '--silent'], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            }).trim()
          }
          catch {
            latest = ''
          }

          if (!latest) latest = '0.0.0'

          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(latest)
          if (!match) {
            throw new Error(`npm latest dist-tag for ${packageName} is not a plain semver version: ${latest}`)
          }

          const parts = match.slice(1).map(Number)
          if (bump === 'major') {
            parts[0] += 1
            parts[1] = 0
            parts[2] = 0
          }
          else if (bump === 'minor') {
            parts[1] += 1
            parts[2] = 0
          }
          else if (bump === 'patch') {
            parts[2] += 1
          }
          else {
            throw new Error(`Unsupported bump: ${bump}`)
          }

          const next = parts.join('.')
          console.log(`package_name=${packageName}`)
          console.log(`latest_version=${latest}`)
          console.log(`next_version=${next}`)
          console.log(`tag=v${next}`)
          NODE

      - name: Check release target
        env:
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists." >&2
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$NEXT_VERSION" version --silent >/dev/null 2>&1; then
            echo "npm package $PACKAGE_NAME@$NEXT_VERSION already exists." >&2
            exit 1
          fi

      - name: Set package version
        run: npm --prefix packages/editor version "${{ steps.version.outputs.next_version }}" --no-git-tag-version

      - name: Build
        run: bun run build

      - name: Remove dev dependencies from published manifest
        run: npm pkg delete devDependencies --prefix packages/editor

      - name: Pack editor
        id: pack
        run: |
          node <<'NODE' > /tmp/pack-editor.js
          const { execFileSync } = require('node:child_process')
          const packOutput = execFileSync('npm', ['pack', '--json'], {
            cwd: 'packages/editor',
            encoding: 'utf8',
            stdio: ['ignore', 'pipe', 'inherit'],
          })
          const [pack] = JSON.parse(packOutput)
          if (!pack?.filename) throw new Error('npm pack did not return a filename')
          console.log(`tarball=packages/editor/${pack.filename}`)
          NODE
          node /tmp/pack-editor.js >> "$GITHUB_OUTPUT"

      - name: Verify published manifest
        run: |
          cat > /tmp/verify-editor-package.js <<'NODE'
          let source = ''
          process.stdin.setEncoding('utf8')
          process.stdin.on('data', (chunk) => source += chunk)
          process.stdin.on('end', () => {
            const manifest = JSON.parse(source)
            if (manifest.devDependencies) {
              throw new Error('Packed editor package still contains devDependencies')
            }
            if (manifest.version !== process.env.NEXT_VERSION) {
              throw new Error(`Packed version ${manifest.version} did not match ${process.env.NEXT_VERSION}`)
            }
          })
          NODE
          tar -xOf "${{ steps.pack.outputs.tarball }}" package/package.json | node /tmp/verify-editor-package.js
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball }}"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" "$GITHUB_SHA"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          LATEST_VERSION: ${{ steps.version.outputs.latest_version }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          TAG: ${{ steps.version.outputs.tag }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          gh release create "$TAG" "$TARBALL" \
            --title "$PACKAGE_NAME $NEXT_VERSION" \
            --notes "Published $PACKAGE_NAME $NEXT_VERSION to npm using Trusted Publishing.

          Previous npm latest: $LATEST_VERSION
          Version bump: ${{ inputs.bump }}"
